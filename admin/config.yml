backend:
  name: git-gateway
  branch: main

# Where uploaded images go
media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

# All editable content
collections:
  - name: "site_data"
    label: "Site Content"
    files:
      - file: "config.json"
        label: "Edit Site Content"
        name: "site_config"
        format: "json"
        fields:

          # ============ SITE GLOBALS ============
          - label: "Site Settings"
            name: "site"
            widget: "object"
            fields:
              - {label: "Page Title", name: "title", widget: "string"}
              - {label: "Meta Description", name: "description", widget: "text"}
              - {label: "Email Address", name: "email", widget: "string"}
              - {label: "Instagram URL", name: "instagram_url", widget: "string"}
              - {label: "Footer About Text", name: "footer_about", widget: "text"}
              - {label: "Footer Credit Line", name: "footer_credit", widget: "string"}
              - {label: "Copyright Year", name: "copyright_year", widget: "string"}

          # ============ PROMO BANNER ============
          - label: "Promo Banner"
            name: "promo"
            widget: "object"
            fields:
              - {label: "Show Banner?", name: "enabled", widget: "boolean", default: true}
              - {label: "Text Before Emphasis", name: "text_before", widget: "string", hint: "e.g. Limited intro pricing —"}
              - {label: "Emphasized Text", name: "text_emphasis", widget: "string", hint: "e.g. $200 off"}
              - {label: "Text After Emphasis", name: "text_after", widget: "string", hint: "e.g. all packages booked before June 1"}

          # ============ HERO ============
          - label: "Homepage Hero"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Eyebrow Tag", name: "eyebrow", widget: "string"}
              - {label: "Headline (start)", name: "headline_start", widget: "string"}
              - {label: "Headline (italic emphasis)", name: "headline_emphasis", widget: "string"}
              - {label: "Lead Paragraph", name: "lead", widget: "text"}
              - {label: "Primary CTA Label", name: "cta_primary", widget: "string"}
              - {label: "Secondary CTA Label", name: "cta_secondary", widget: "string"}

          # ============ AUDIENCES ============
          - label: "Who I Work With"
            name: "audiences"
            widget: "object"
            fields:
              - {label: "Section Label", name: "section_label", widget: "string"}
              - {label: "Headline (start)", name: "headline_start", widget: "string"}
              - {label: "Headline (italic emphasis)", name: "headline_emphasis", widget: "string"}
              - {label: "Lead Paragraph", name: "lead", widget: "text"}
              - label: "Audience Cards"
                name: "cards"
                widget: "list"
                fields:
                  - {label: "Number", name: "number", widget: "string"}
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Description", name: "description", widget: "text"}

          # ============ INCLUDED ============
          - label: "What's Included"
            name: "included"
            widget: "object"
            fields:
              - {label: "Section Label", name: "section_label", widget: "string"}
              - {label: "Headline (start)", name: "headline_start", widget: "string"}
              - {label: "Headline (italic emphasis)", name: "headline_emphasis", widget: "string"}
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Description", name: "description", widget: "string"}

          # ============ WORK ============
          - label: "Work Portfolio"
            name: "work"
            widget: "object"
            fields:
              - {label: "Section Label", name: "section_label", widget: "string"}
              - {label: "Headline (start)", name: "headline_start", widget: "string"}
              - {label: "Headline (italic emphasis)", name: "headline_emphasis", widget: "string"}
              - {label: "Lead Paragraph", name: "lead", widget: "text"}
              - label: "Projects"
                name: "projects"
                widget: "list"
                fields:
                  - {label: "URL Display (in mockup bar)", name: "url_display", widget: "string", hint: "e.g. monmouth200club.com"}
                  - {label: "Tag", name: "tag", widget: "string", hint: "e.g. Multipage · Nonprofit"}
                  - {label: "Project Title", name: "title", widget: "string"}
                  - {label: "Description", name: "description", widget: "text"}
                  - {label: "Desktop Screenshot", name: "desktop_image", widget: "image", required: false, hint: "Long full-page desktop screenshot"}
                  - {label: "Mobile Screenshot", name: "mobile_image", widget: "image", required: false, hint: "Long full-page mobile screenshot"}
                  - {label: "Live URL (optional)", name: "live_url", widget: "string", required: false}

          # ============ ABOUT ============
          - label: "About Section"
            name: "about"
            widget: "object"
            fields:
              - {label: "Section Label", name: "section_label", widget: "string"}
              - {label: "Headline (start)", name: "headline_start", widget: "string"}
              - {label: "Headline (italic emphasis)", name: "headline_emphasis", widget: "string"}
              - {label: "Photo of Chevelle", name: "photo_image", widget: "image", required: false}
              - label: "Paragraphs"
                name: "paragraphs"
                widget: "list"
                field: {label: "Paragraph", name: "text", widget: "text"}
                hint: "HTML allowed — wrap words in <em>like this</em> for italic emphasis"
              - {label: "Script Flourish (top line)", name: "script_flourish", widget: "string"}
              - {label: "Closing Line (under flourish)", name: "closing_line", widget: "string"}

          # ============ PROCESS ============
          - label: "Process Roadmap"
            name: "process"
            widget: "object"
            fields:
              - {label: "Section Label", name: "section_label", widget: "string"}
              - {label: "Headline (start)", name: "headline_start", widget: "string"}
              - {label: "Headline (italic emphasis)", name: "headline_emphasis", widget: "string"}
              - {label: "Lead Paragraph", name: "lead", widget: "text"}
              - label: "Roadmap Stops"
                name: "stops"
                widget: "list"
                fields:
                  - {label: "Number", name: "number", widget: "string", hint: "e.g. 01, 02, 03"}
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Description", name: "description", widget: "text"}

          # ============ PRICING ============
          - label: "Pricing"
            name: "pricing"
            widget: "object"
            fields:
              - {label: "Section Label", name: "section_label", widget: "string"}
              - {label: "Headline (start)", name: "headline_start", widget: "string"}
              - {label: "Headline (italic emphasis)", name: "headline_emphasis", widget: "string"}
              - {label: "Lead Paragraph", name: "lead", widget: "text"}
              - {label: "Savings Label", name: "savings_label", widget: "string", hint: "e.g. Save $200 — intro"}
              - label: "Featured Package ID"
                name: "featured_package"
                widget: "select"
                options:
                  - {label: "The Quick Call", value: "the-quick-call"}
                  - {label: "The Connection", value: "the-connection"}
                  - {label: "The Hotline", value: "the-hotline"}
                  - {label: "The Operator", value: "the-operator"}
                  - {label: "None", value: ""}
                hint: "Which package gets the pink Most Popular treatment"
              - label: "Packages"
                name: "packages"
                widget: "list"
                fields:
                  - {label: "Package ID", name: "id", widget: "string", hint: "URL-safe slug, e.g. the-connection"}
                  - {label: "Name", name: "name", widget: "string"}
                  - {label: "Subtitle", name: "subtitle", widget: "string"}
                  - {label: "Intro Price", name: "price_intro", widget: "string"}
                  - {label: "Full Price (struck through)", name: "price_full", widget: "string"}
                  - {label: "For Whom (italic)", name: "for_whom", widget: "text"}
                  - label: "Bullets"
                    name: "bullets"
                    widget: "list"
                    field: {label: "Bullet", name: "text", widget: "string"}
                    hint: "Keep parallel structure across packages so they line up"
                  - {label: "CTA Button Label", name: "cta_label", widget: "string"}
              - label: "Add-Ons (The Extension)"
                name: "addons"
                widget: "object"
                fields:
                  - {label: "Section Label", name: "section_label", widget: "string"}
                  - {label: "Headline (start)", name: "headline_start", widget: "string"}
                  - {label: "Headline (italic emphasis)", name: "headline_emphasis", widget: "string"}
                  - {label: "Lead Paragraph", name: "lead", widget: "text"}
                  - label: "Add-On Items"
                    name: "items"
                    widget: "list"
                    fields:
                      - {label: "Price", name: "price", widget: "string", hint: "e.g. $150"}
                      - {label: "Label", name: "label", widget: "string", hint: "e.g. per page"}
                      - {label: "Title", name: "title", widget: "string"}
                      - {label: "Description", name: "description", widget: "text"}

          # ============ INQUIRY FORM ============
          - label: "Inquiry Form"
            name: "inquiry"
            widget: "object"
            fields:
              - {label: "Section Label", name: "section_label", widget: "string"}
              - {label: "Headline (start)", name: "headline_start", widget: "string"}
              - {label: "Headline (italic emphasis)", name: "headline_emphasis", widget: "string"}
              - {label: "Lead Paragraph", name: "lead", widget: "text"}
              - {label: "Formspree Endpoint URL", name: "formspree_endpoint", widget: "string", required: false, hint: "https://formspree.io/f/YOUR_ID"}
              - {label: "Submit Button Label", name: "submit_label", widget: "string"}

          # ============ CLIENTS (passwords for consultation/feedback) ============
          - label: "Client Passwords"
            name: "clients"
            widget: "list"
            hint: "Each client gets a unique password for the consultation and feedback pages"
            fields:
              - {label: "Client ID (slug)", name: "id", widget: "string"}
              - {label: "Password", name: "password", widget: "string"}
              - {label: "Client Name", name: "client_name", widget: "string"}
              - {label: "Project Name", name: "project_name", widget: "string"}
              - {label: "Active?", name: "active", widget: "boolean", default: true}
