backend:
  name: git-gateway
  branch: main

# Where uploaded images go
media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

# Site name shown in admin
site_url: https://bychevelle.com
display_url: https://bychevelle.com
logo_url: /assets/images/logo-primary-web.png

# All editable content
collections:
  - name: "site_data"
    label: "Edit Your Site"
    files:
      - file: "config.json"
        label: "Edit Site Content"
        name: "site_config"
        format: "json"
        fields:

          # ============ 🎨 BRAND & LOGOS ============
          - label: "🎨 Brand & Logos"
            name: "site"
            widget: "object"
            hint: "Your logo files, page title, contact info, and footer text. Upload custom logos here to replace the defaults."
            fields:
              - label: "🖼️ Header Logo"
                name: "logo_primary"
                widget: "image"
                required: false
                hint: "The big logo at the top of every page. Recommended: PNG with transparent background, around 800px wide."
              - label: "🖼️ Footer Logo"
                name: "logo_footer"
                widget: "image"
                required: false
                hint: "The logo in the footer (sits on a cream stamp on the red background). Can be the same as header logo, or a simplified version."
              - label: "📱 Favicon"
                name: "favicon"
                widget: "image"
                required: false
                hint: "Tiny icon shown in browser tabs and bookmarks. Should be square, 256x256 minimum."
              - label: "🔒 Gate Icon"
                name: "gate_icon"
                widget: "image"
                required: false
                hint: "Small icon shown above the password box on the Consultation and Feedback pages."
              - label: "📄 Page Title"
                name: "title"
                widget: "string"
                hint: "Shows up in the browser tab. Keep it under 60 characters."
              - label: "📝 Meta Description"
                name: "description"
                widget: "text"
                hint: "Shows up under your link in Google search results. Keep it under 160 characters."
              - label: "📧 Email Address"
                name: "email"
                widget: "string"
                hint: "Where contact form submissions and Connect link clicks go."
              - label: "📷 Instagram URL"
                name: "instagram_url"
                widget: "string"
                hint: "Full URL including https://"
              - label: "✏️ Footer About Text"
                name: "footer_about"
                widget: "text"
                hint: "Short blurb in the footer's About column."
              - label: "✏️ Footer Credit Line"
                name: "footer_credit"
                widget: "string"
                hint: "The italic line at the very bottom (e.g. \"Designed & built by Chevelle. Of course.\")"
              - label: "📅 Copyright Year"
                name: "copyright_year"
                widget: "string"
                hint: "Update once a year."

          # ============ 📣 PROMO BANNER ============
          - label: "📣 Promo Banner"
            name: "promo"
            widget: "object"
            hint: "The thin red banner at the very top of every page. Toggle it off when you don't want one running."
            fields:
              - {label: "✅ Show Banner?", name: "enabled", widget: "boolean", default: true, hint: "Turn off to hide the banner site-wide."}
              - {label: "Text Before Emphasis", name: "text_before", widget: "string", hint: "e.g. Limited intro pricing —"}
              - {label: "🔥 Emphasized Text (italic)", name: "text_emphasis", widget: "string", hint: "The pink italic part. e.g. $200 off"}
              - {label: "Text After Emphasis", name: "text_after", widget: "string", hint: "e.g. all packages booked before June 1"}

          # ============ 🚀 HOMEPAGE HERO ============
          - label: "🚀 Homepage Hero"
            name: "hero"
            widget: "object"
            hint: "The big top section of the homepage with the headline and CTAs. First thing people see."
            fields:
              - {label: "Eyebrow Tag (small uppercase)", name: "eyebrow", widget: "string", hint: "e.g. Brand Strategy · Web Design · Copy"}
              - {label: "Headline (start)", name: "headline_start", widget: "string", hint: "First part of the headline, normal weight."}
              - {label: "🎯 Headline (italic emphasis)", name: "headline_emphasis", widget: "string", hint: "The italic red part. e.g. built the right way."}
              - {label: "Lead Paragraph", name: "lead", widget: "text", hint: "One sentence under the headline that explains what you do."}
              - {label: "Primary CTA Button", name: "cta_primary", widget: "string", hint: "e.g. Start your project →"}
              - {label: "Secondary CTA Button", name: "cta_secondary", widget: "string", hint: "e.g. See the work"}

          # ============ 👥 WHO I WORK WITH ============
          - label: "👥 Who I Work With"
            name: "audiences"
            widget: "object"
            hint: "The pink section showing the 4 types of clients you work with."
            fields:
              - {label: "Section Label", name: "section_label", widget: "string"}
              - {label: "Headline (start)", name: "headline_start", widget: "string"}
              - {label: "🎯 Headline (italic emphasis)", name: "headline_emphasis", widget: "string"}
              - {label: "Lead Paragraph", name: "lead", widget: "text"}
              - label: "📇 Audience Cards"
                name: "cards"
                widget: "list"
                hint: "Add, remove, or reorder the 4 audience type cards."
                fields:
                  - {label: "Number", name: "number", widget: "string", hint: "e.g. 01, 02, 03"}
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Description", name: "description", widget: "text"}

          # ============ ✨ WHAT'S INCLUDED ============
          - label: "✨ What's Included"
            name: "included"
            widget: "object"
            hint: "The 4-icon row showing what comes with every project. Icons stay fixed but you can edit the labels and descriptions."
            fields:
              - {label: "Section Label", name: "section_label", widget: "string"}
              - {label: "Headline (start)", name: "headline_start", widget: "string"}
              - {label: "🎯 Headline (italic emphasis)", name: "headline_emphasis", widget: "string"}
              - label: "🌟 Included Items"
                name: "items"
                widget: "list"
                hint: "Keep this at exactly 4 items — the icons are tied to position."
                fields:
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Description (one short line)", name: "description", widget: "string"}

          # ============ 💼 WORK PORTFOLIO ============
          - label: "💼 Work Portfolio"
            name: "work"
            widget: "object"
            hint: "Your portfolio of client sites. Shows on the homepage AND on the Work page. Add a new project here when you finish a build."
            fields:
              - {label: "Section Label", name: "section_label", widget: "string"}
              - {label: "Headline (start)", name: "headline_start", widget: "string"}
              - {label: "🎯 Headline (italic emphasis)", name: "headline_emphasis", widget: "string"}
              - {label: "Lead Paragraph", name: "lead", widget: "text"}
              - label: "🖼️ Projects"
                name: "projects"
                widget: "list"
                hint: "Add a new project for every site you finish. Use the GoFullPage Chrome extension to take long screenshots."
                fields:
                  - {label: "🌐 URL Display (in mockup bar)", name: "url_display", widget: "string", hint: "e.g. monmouth200club.com — what shows in the fake browser bar"}
                  - {label: "🏷️ Tag", name: "tag", widget: "string", hint: "e.g. Multipage · Nonprofit"}
                  - {label: "Project Title", name: "title", widget: "string"}
                  - {label: "Description", name: "description", widget: "text"}
                  - {label: "🖥️ Desktop Screenshot", name: "desktop_image", widget: "image", required: false, hint: "Long full-page desktop screenshot (PNG)"}
                  - {label: "📱 Mobile Screenshot", name: "mobile_image", widget: "image", required: false, hint: "Long full-page mobile screenshot (PNG)"}
                  - {label: "🔗 Live URL (optional)", name: "live_url", widget: "string", required: false, hint: "Full URL with https://"}

          # ============ 👋 ABOUT SECTION ============
          - label: "👋 About Section"
            name: "about"
            widget: "object"
            hint: "Your bio and photo. The personable section where you introduce yourself."
            fields:
              - {label: "Section Label", name: "section_label", widget: "string"}
              - {label: "Headline (start)", name: "headline_start", widget: "string"}
              - {label: "🎯 Headline (italic emphasis)", name: "headline_emphasis", widget: "string"}
              - {label: "📸 Photo of You", name: "photo_image", widget: "image", required: false, hint: "Recommended: 4:5 portrait orientation. Will fill the left column on desktop."}
              - label: "📝 About Paragraphs"
                name: "paragraphs"
                widget: "list"
                hint: "Add as many as you want. HTML allowed — wrap words in <em>like this</em> for italic emphasis."
                field: {label: "Paragraph", name: "text", widget: "text"}
              - {label: "✒️ Script Flourish (top line)", name: "script_flourish", widget: "string", hint: "The handwritten-style text in red. e.g. Strategy first."}
              - {label: "Closing Line (under flourish)", name: "closing_line", widget: "string", hint: "The line right after the script flourish."}

          # ============ 🗺️ PROCESS ROADMAP ============
          - label: "🗺️ Process Roadmap"
            name: "process"
            widget: "object"
            hint: "The 6-stop roadmap on the homepage. The longer detailed Process page is in process.html — edit that separately if you want to change the deep version."
            fields:
              - {label: "Section Label", name: "section_label", widget: "string"}
              - {label: "Headline (start)", name: "headline_start", widget: "string"}
              - {label: "🎯 Headline (italic emphasis)", name: "headline_emphasis", widget: "string"}
              - {label: "Lead Paragraph", name: "lead", widget: "text"}
              - label: "📍 Roadmap Stops"
                name: "stops"
                widget: "list"
                hint: "The numbered stops along the curved roadmap."
                fields:
                  - {label: "Number", name: "number", widget: "string", hint: "e.g. 01, 02, 03"}
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Description (1-2 sentences)", name: "description", widget: "text"}

          # ============ 💰 PRICING ============
          - label: "💰 Pricing & Packages"
            name: "pricing"
            widget: "object"
            hint: "All 4 pricing cards plus the add-ons section. Edit prices, package names, bullets, and which one gets the pink Most Popular highlight."
            fields:
              - {label: "Section Label", name: "section_label", widget: "string"}
              - {label: "Headline (start)", name: "headline_start", widget: "string"}
              - {label: "🎯 Headline (italic emphasis)", name: "headline_emphasis", widget: "string"}
              - {label: "Lead Paragraph", name: "lead", widget: "text"}
              - {label: "💸 Savings Label", name: "savings_label", widget: "string", hint: "Shows under the price on each card. e.g. Save $200 — intro"}
              - label: "⭐ Featured Package"
                name: "featured_package"
                widget: "select"
                options:
                  - {label: "The Quick Call", value: "the-quick-call"}
                  - {label: "The Connection ⭐", value: "the-connection"}
                  - {label: "The Hotline", value: "the-hotline"}
                  - {label: "The Operator", value: "the-operator"}
                  - {label: "None — no featured card", value: ""}
                hint: "Which package gets the pink card with the Most Popular badge."
              - label: "📦 Packages"
                name: "packages"
                widget: "list"
                hint: "Edit each pricing card. Keep bullet structure parallel across all cards so they line up visually."
                fields:
                  - {label: "Package ID (slug)", name: "id", widget: "string", hint: "URL-safe lowercase. Must match the Featured Package value above. e.g. the-connection"}
                  - {label: "📛 Package Name", name: "name", widget: "string"}
                  - {label: "Subtitle (small uppercase)", name: "subtitle", widget: "string", hint: "e.g. Built-Out One-Page"}
                  - {label: "💵 Intro Price", name: "price_intro", widget: "string", hint: "Current price shown big. e.g. $1,000"}
                  - {label: "💸 Full Price (struck through)", name: "price_full", widget: "string", hint: "Original price shown crossed out. e.g. $1,200"}
                  - {label: "✨ For Whom (italic)", name: "for_whom", widget: "text", hint: "Short italic line describing who this package is for."}
                  - label: "✅ Bullets"
                    name: "bullets"
                    widget: "list"
                    field: {label: "Bullet", name: "text", widget: "string"}
                    hint: "Keep these to 8 bullets each, in parallel order, so the cards align across packages."
                  - {label: "Button Label", name: "cta_label", widget: "string", hint: "e.g. Get started, Get a quote"}
              - label: "➕ Add-Ons (The Extension)"
                name: "addons"
                widget: "object"
                hint: "Smaller cards under the main packages — for current and past clients to add things later."
                fields:
                  - {label: "Section Label", name: "section_label", widget: "string"}
                  - {label: "Headline (start)", name: "headline_start", widget: "string"}
                  - {label: "🎯 Headline (italic emphasis)", name: "headline_emphasis", widget: "string"}
                  - {label: "Lead Paragraph", name: "lead", widget: "text"}
                  - label: "🛒 Add-On Items"
                    name: "items"
                    widget: "list"
                    fields:
                      - {label: "💵 Price", name: "price", widget: "string", hint: "e.g. $150 or $200+"}
                      - {label: "Label", name: "label", widget: "string", hint: "e.g. per page, per month"}
                      - {label: "Title", name: "title", widget: "string"}
                      - {label: "Description", name: "description", widget: "text"}

          # ============ 📨 INQUIRY FORM ============
          - label: "📨 Inquiry Form"
            name: "inquiry"
            widget: "object"
            hint: "The contact form section at the bottom of the homepage. Wire up Formspree here so submissions actually email you."
            fields:
              - {label: "Section Label", name: "section_label", widget: "string"}
              - {label: "Headline (start)", name: "headline_start", widget: "string"}
              - {label: "🎯 Headline (italic emphasis)", name: "headline_emphasis", widget: "string"}
              - {label: "Lead Paragraph", name: "lead", widget: "text"}
              - {label: "📬 Formspree Endpoint URL", name: "formspree_endpoint", widget: "string", required: false, hint: "Get this from formspree.io. Looks like https://formspree.io/f/YOUR_ID. Leave blank until you've signed up."}
              - {label: "Submit Button Label", name: "submit_label", widget: "string", hint: "e.g. Submit inquiry →"}

          # ============ 🔮 CONSULTATION PAGE ============
          - label: "🔮 Client Consultation Page"
            name: "consultation"
            widget: "object"
            hint: "The interactive consultation wizard. Upload reference images for visual styles, color combos, and photography styles. Wire up Formspree here so submissions reach your inbox."
            fields:
              - {label: "📬 Formspree Endpoint URL", name: "formspree_endpoint", widget: "string", required: false, hint: "Where consultation submissions go. Get this from formspree.io"}
              - {label: "📝 Intro Lead Text", name: "intro_lead", widget: "text", hint: "Shows under the page headline."}
              - label: "🎨 Visual Styles (Step 5)"
                name: "visual_styles"
                widget: "list"
                hint: "Mood-board style references. Each one shows as a card. Recommended: 6 options."
                fields:
                  - {label: "ID (slug)", name: "id", widget: "string"}
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Subtitle (one short line)", name: "subtitle", widget: "string"}
                  - {label: "🖼️ Reference Image", name: "image", widget: "image", required: false, hint: "Upload a mood-board image showing this style"}
              - label: "🌈 Color Combinations (Step 7)"
                name: "color_combos"
                widget: "list"
                hint: "10 color combinations to choose from. Upload reference images showing each palette."
                fields:
                  - {label: "ID (slug)", name: "id", widget: "string"}
                  - {label: "Label", name: "label", widget: "string", hint: "e.g. Warm neutrals, Navy & cream"}
                  - {label: "🖼️ Color Palette Image", name: "image", widget: "image", required: false, hint: "Upload a flat color combo image"}
              - label: "📸 Photography Styles (Step 12)"
                name: "photography_styles"
                widget: "list"
                hint: "Different photography directions. Upload reference photos showing each style."
                fields:
                  - {label: "ID (slug)", name: "id", widget: "string"}
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Subtitle (one short line)", name: "subtitle", widget: "string"}
                  - {label: "🖼️ Reference Photo", name: "image", widget: "image", required: false, hint: "Upload a photo showing this style"}

          # ============ 🔐 CLIENT PASSWORDS ============
          - label: "🔐 Client Passwords"
            name: "clients"
            widget: "list"
            hint: "Each client gets a unique password to access their private Consultation and Feedback pages. Set Active to off to revoke access without deleting the entry."
            fields:
              - {label: "🆔 Client ID", name: "id", widget: "string", hint: "Internal ID for your reference. Lowercase, no spaces. e.g. monmouth200"}
              - {label: "🔑 Password", name: "password", widget: "string", hint: "What the client types in the gate. Lowercase, no spaces. Make it unique per client."}
              - {label: "👤 Client Name", name: "client_name", widget: "string", hint: "For your records — not shown to client."}
              - {label: "📂 Project Name", name: "project_name", widget: "string", hint: "For your records — not shown to client."}
              - {label: "✅ Active?", name: "active", widget: "boolean", default: true, hint: "Turn off when project ends to revoke their access."}
